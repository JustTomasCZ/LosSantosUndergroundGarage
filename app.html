<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mechanik System</title>

<style>
body {
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

body.loaded { opacity: 1; }

input, select, button { padding:10px; margin:5px; }
.card { background:#222; padding:15px; margin-bottom:10px; border-radius:10px; }
h2 { margin-top:0; }
.big { font-size:22px; font-weight:bold; color:#00ff88; }
button { cursor:pointer; }
</style>

</head>

<body>

<h1>🔧 Mechanik System</h1>

<div class="card">
<h2>👤 Mechanik</h2>
<input id="mechanik" placeholder="Jméno mechanika">
</div>

<div class="card">
<h2>⏱ Směna</h2>
<button onclick="startShift()">🟢 Start směny</button>
<button onclick="endShift()">🔴 Konec směny</button>
<p id="shiftStatus">Směna: ❌ neaktivní</p>
</div>

<div class="card">
<h2>🔧 Zakázka</h2>

<select id="frakce">
<option>LSPD</option>
<option>EMS</option>
<option>LSSD</option>
<option>OBČAN</option>
</select>

<select id="typ">
<option>Tuning</option>
<option>Oprava</option>
<option>Oprava bez komponentů</option>
</select>

<br>

<label>
  <input type="checkbox" id="employeeCheck">
  Zaměstnanec (50% sleva)
</label>

<br>

<input id="components" type="number" placeholder="Počet komponent">

<br>

<button onclick="sendLog()">📩 Odeslat</button>
</div>

<div class="card">
<h2>💰 Výplata za směnu</h2>

<p class="big" id="salary">0 $</p>
<p>🔧 Zakázky: <span id="jobs">0</span></p>
<p>💵 Celkový obrat: <span id="total">0</span> $</p>
</div>

<script>

/* =======================
   WEBHOOKY
======================= */
const WEBHOOKS = {
  LSPD: "https://discord.com/api/webhooks/1498994945720193116/7JLdS9rlFYdtMWPphDi7uKd1rzkKNhq3XJxL_Os_6JfeQz79n_dqwjv2o5fsor7QUHTh",
  EMS: "https://discord.com/api/webhooks/1498994888187052194/DJs65eZs6H4xOUT7gQN_Y92-FfxSuC5D4oehiAwQzrJHgbdTWzYwbqFHeN1aqP3iX5y6",
  LSSD: "https://discord.com/api/webhooks/1498995030348660816/6Hoon1Zm6nRI-IOeB6G83n6ucJ8kD-3Ip9KCuYw0dCMGuFnX0XpMURIZ5RgLKGHoCCgA",
  OBČAN: "https://discord.com/api/webhooks/1499001119664377977/Ov2HGZ_ZDlkocu6zDXRvliDQA7t2gQkFqhsCDXwjopFYmb09fBnBMA5LuikAaOcov4OC",
  SHIFTS: "https://discord.com/api/webhooks/1498999184727212143/Dzb4AiJblx51X8CLK6dtMjv54TyXIBx8NBlqB2KTFg33N-TaROz5Jm8UKGK-1gg3f17t"
};

/* =======================
   STAV
======================= */
let shiftActive = false;
let jobs = 0;
let total = 0;

/* =======================
   UI START
======================= */
window.onload = () => {
  document.body.classList.add("loaded");
  updateUI();
};

/* =======================
   DISCORD
======================= */
function sendWebhook(url, content) {
  fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ content })
  });
}

/* =======================
   SMĚNA
======================= */
function startShift() {
  shiftActive = true;

  const name = document.getElementById("mechanik").value || "Neznámý";

  sendWebhook(WEBHOOKS.SHIFTS,
`🟢 START SMĚNY
Mechanik: ${name}`);

  updateUI();
}

function endShift() {
  shiftActive = false;

  const name = document.getElementById("mechanik").value || "Neznámý";

  sendWebhook(WEBHOOKS.SHIFTS,
`🔴 KONEC SMĚNY
Mechanik: ${name}
Výplata: ${Math.floor(total * 0.2)}$`);

  jobs = 0;
  total = 0;

  updateUI();
}

/* =======================
   LOG
======================= */
function sendLog() {
  if (!shiftActive) return alert("Nejdřív začni směnu!");

  const name = document.getElementById("mechanik").value || "Neznámý";
  const frakce = document.getElementById("frakce").value;
  const typ = document.getElementById("typ").value;
  const components = Number(document.getElementById("components").value);
  const isEmployee = document.getElementById("employeeCheck").checked;

  const PRICES = {
    LSPD: 90,
    EMS: 150,
    LSSD: 150,
    OBČAN: 150
  };

  let price;

  if (typ === "Oprava bez komponentů") {
    price = 500;
  } else {
    price = PRICES[frakce] * (components || 0);
  }

  if (isEmployee) {
    price = Math.floor(price * 0.5);
  }

  jobs++;
  total += price;

  const prefix = isEmployee ? "👷 ZAMĚSTNANEC" : "🔧";

  const msg =
`${prefix} ${typ}
Mechanik: ${name}
Cena: ${price}$`;

  sendWebhook(WEBHOOKS[frakce], msg);

  updateUI();
}

/* =======================
   UI
======================= */
function updateUI() {
  document.getElementById("jobs").innerText = jobs;
  document.getElementById("total").innerText = total;
  document.getElementById("salary").innerText = Math.floor(total * 0.2) + " $";

  document.getElementById("shiftStatus").innerText =
    "Směna: " + (shiftActive ? "✔ aktivní" : "❌ neaktivní");
}

</script>

</body>
</html>
